name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-local:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Backdoor — only enabled in CI. Production deploy never sees this.
      ALLOW_TEST_SIGNIN: 'true'
      GOOGLE_CLIENT_ID: dummy-client-id-for-ci
      LOCAL_APP_URL: http://localhost:8081
      API_BASE: http://localhost:8787

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Apply local D1 migration
        run: npm run migrate:local --workspace=api

      - name: Start Worker (wrangler dev)
        run: |
          cd api
          echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" > .dev.vars
          echo "ALLOW_TEST_SIGNIN=$ALLOW_TEST_SIGNIN" >> .dev.vars
          nohup npx wrangler dev --port 8787 --ip 127.0.0.1 > wrangler.log 2>&1 &
          # Wait until /health responds
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8787/health > /dev/null; then
              echo "Worker up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Worker failed to start"; cat wrangler.log; exit 1

      - name: Start Expo web (expo start)
        run: |
          cd app
          echo "EXPO_PUBLIC_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" > .env
          echo "EXPO_PUBLIC_API_BASE=$API_BASE" >> .env
          nohup npx expo start --web --port 8081 > expo.log 2>&1 &
          # Expo's dev server takes ~30s the first time
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8081/ > /dev/null; then
              echo "Expo up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Expo failed to start"; tail -50 expo.log; exit 1

      - name: Run Playwright tests
        run: npm test --workspace=e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: server-logs
          path: |
            api/wrangler.log
            app/expo.log
          retention-days: 7

  prod-smoke:
    # Runs only on main pushes — quick "is production alive" check.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: e2e-local

    env:
      PROD_APP_URL: https://swimbuddy.pages.dev
      API_BASE: https://swimbuddy-api.buddhima.workers.dev

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - run: npm run test:e2e:prod
